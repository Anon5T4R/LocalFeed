    <path d="M 0 176 A 216 216 0 0 1 216 392" fill="none" stroke="#ea580c" stroke-width="72" stroke-linecap="round"/>
    <path d="M 0 22 A 370 370 0 0 1 370 392" fill="none" stroke="#f97316" stroke-width="72" stroke-linecap="round"/>
  </g>

  <!-- linhas de artigo -->
